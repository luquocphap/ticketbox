services:
  redis:
    container_name: con-redis-ticketbox
    image: redis:latest
    ports:
      - 6380:6379
  mysql:
    container_name: con-mysql-ticketbox
    image: mysql:latest
    ports:
      - 3307:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}

  pinterest:
    container_name: con-backend-ticketbox
    image: luquocphap/img-ticketbox:latest
    ports:
      - 3070:3069
    env_file:
      - .env
  